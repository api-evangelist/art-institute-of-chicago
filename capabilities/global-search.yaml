apiVersion: naftiko.io/v1
kind: Capability
metadata:
  name: global-search
  description: Single cross-resource search across the collection, exhibitions, articles,
    and more.
spec:
  provider: Art Institute of Chicago
  baseUrl: https://api.artic.edu/api/v1
  operations:
  - id: searchAll
    method: GET
    path: /search
    purpose: Global multi-index search.
