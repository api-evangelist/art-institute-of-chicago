aid: art-institute-of-chicago
name: Art Institute of Chicago
description: >-
  The Art Institute of Chicago publishes an open, REST + Elasticsearch-style Public API for ~120,000 artworks plus
  agents (artists/makers), places, galleries, exhibitions, tours, mobile sounds, museum-shop products, publications,
  sections, sites, educator resources, digital and printed publications, and static archive images. Most data is CC0
  1.0; descriptions and place data are CC-BY 4.0. No API key required; anonymous limit is 60 requests/minute per IP.
  Clients should send an AIC-User-Agent header for courtesy tracking. The canonical aggregator (Laravel) is open source
  on GitHub, and nightly bulk data dumps are published in a sibling repo.
